<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — DON LOOKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.product-page{display:grid;grid-template-columns:1fr 1fr;gap:80px;padding:120px 0 100px;}
.product-gallery{position:sticky;top:100px;align-self:start;}
.gallery-main{aspect-ratio:3/4;background:var(--cream);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:16px;position:relative;overflow:hidden;}
.gallery-main img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.gallery-mono{font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:300;color:rgba(90,50,0,.07);user-select:none;}
.gallery-badge{position:absolute;top:16px;left:16px;color:var(--white);font-size:8px;letter-spacing:2px;font-weight:700;padding:5px 12px;text-transform:uppercase;}
.gallery-thumbs{display:flex;gap:12px;}
.gallery-thumb{width:72px;height:90px;background:var(--cream);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:22px;color:rgba(90,50,0,.15);transition:border-color .3s;flex-shrink:0;}
.gallery-thumb.active,.gallery-thumb:hover{border-color:var(--brown-mid);}

.product-info{padding-top:20px;}
.prod-eyebrow{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--brown-light);margin-bottom:12px;}
.prod-name{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,3vw,48px);font-weight:300;color:var(--text-dark);line-height:1.1;margin-bottom:16px;}
.prod-rating-row{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.prod-stars{color:var(--gold);font-size:14px;letter-spacing:2px;}
.prod-reviews{font-size:11px;color:var(--text-muted);}
.prod-price{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:var(--text-dark);margin-bottom:8px;}
.prod-original{font-size:18px;color:var(--text-muted);text-decoration:line-through;margin-left:12px;}
.prod-desc{font-size:13px;color:var(--text-muted);line-height:2;margin-bottom:32px;border-top:1px solid var(--border);padding-top:24px;}

.option-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dark);font-weight:700;margin-bottom:12px;}
.color-options{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;}
.color-btn{padding:8px 18px;border:1px solid var(--border);font-size:11px;font-family:'Montserrat',sans-serif;color:var(--text-mid);cursor:pointer;background:none;transition:all .3s;}
.color-btn:hover,.color-btn.active{border-color:var(--brown-mid);background:var(--cream);}
.size-options{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.size-btn{min-width:48px;height:48px;border:1px solid var(--border);font-size:11px;font-family:'Montserrat',sans-serif;color:var(--text-mid);cursor:pointer;background:none;transition:all .3s;padding:0 12px;}
.size-btn:hover{border-color:var(--brown-mid);}
.size-btn.active{border-color:var(--brown-mid);background:var(--brown-mid);color:white;}
.size-guide-link{font-size:10px;color:var(--brown-mid);text-decoration:underline;cursor:pointer;margin-bottom:28px;display:inline-block;}

.qty-row{display:flex;align-items:center;gap:16px;margin-bottom:28px;}
.qty-ctrl{display:flex;align-items:center;border:1px solid var(--border);}
.qty-btn{width:44px;height:44px;border:none;background:none;font-size:18px;cursor:pointer;color:var(--text-mid);transition:background .2s;}
.qty-btn:hover{background:var(--cream);}
.qty-num{width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;border-left:1px solid var(--border);border-right:1px solid var(--border);}

.add-to-bag{flex:1;padding:18px;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--white);background:var(--brown-mid);border:none;cursor:pointer;font-family:'Montserrat',sans-serif;transition:background .35s;}
.add-to-bag:hover{background:var(--brown-dark);}
.wishlist-btn{width:56px;height:56px;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;}
.wishlist-btn:hover,.wishlist-btn.active{border-color:var(--brown-mid);}
.wishlist-btn.active svg{fill:var(--brown-mid);stroke:var(--brown-mid);}

.product-cta-row{display:flex;gap:12px;margin-bottom:32px;}

.product-meta{border-top:1px solid var(--border);padding-top:24px;display:flex;flex-direction:column;gap:12px;}
.meta-row{display:flex;gap:16px;font-size:12px;}
.meta-label{color:var(--text-dark);font-weight:600;width:100px;flex-shrink:0;}
.meta-value{color:var(--text-muted);}

.tabs{border-bottom:1px solid var(--border);display:flex;gap:32px;margin-bottom:24px;}
.tab-btn{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-muted);background:none;border:none;padding:12px 0;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .3s;font-family:'Montserrat',sans-serif;}
.tab-btn.active{color:var(--brown-mid);border-bottom-color:var(--brown-mid);}
.tab-content{display:none;font-size:13px;color:var(--text-muted);line-height:2;}
.tab-content.active{display:block;}

.related-section{padding:80px 0;border-top:1px solid var(--border);}

@media(max-width:900px){
  .product-page{grid-template-columns:1fr;gap:40px;padding:100px 0 60px;}
  .product-gallery{position:static;}
}
</style>
</head>
<body>
<div id="navContainer"></div>

<div class="container">
  <div style="padding-top:100px" class="breadcrumb" id="breadcrumb">
    <a href="index.html">Home</a> / <a href="shop.html">Shop</a> / <span id="breadcrumbName">Product</span>
  </div>

  <div class="product-page" id="productPage">
    <div style="text-align:center;padding:100px 0;grid-column:1/-1">
      <p style="color:var(--text-muted)">Loading product...</p>
    </div>
  </div>
</div>

<!-- RELATED -->
<div class="container">
  <div class="related-section">
    <div style="margin-bottom:40px">
      <div class="sec-label">You Might Also Like</div>
      <h2 class="sec-h2">Related <em>Pieces</em></h2>
    </div>
    <div class="products-grid" id="relatedGrid"></div>
  </div>
</div>

<div id="footerContainer"></div>
<script src="data.js"></script>
<script src="app.js"></script>
<script>
document.getElementById('navContainer').innerHTML = renderNav('shop');
document.getElementById('footerContainer').innerHTML = renderFooter();

const id = parseInt(new URLSearchParams(location.search).get('id'));
const product = DONLOOKS.products.find(p=>p.id===id);

if(!product){
  document.getElementById('productPage').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">😕</div><h3>Product Not Found</h3><p>This product doesn't exist.</p><a href="shop.html" class="btn-fill">Back to Shop</a></div>`;
} else {
  document.title = product.name + ' — DON LOOKS';
  document.getElementById('breadcrumbName').textContent = product.name;

  let selectedSize = product.sizes[0];
  let selectedColor = product.colors[0];
  let qty = 1;
  let wishlisted = Wishlist.has(product.id);

  const badgeClass = product.badge ? `badge-${product.badge.toLowerCase().replace(' ','-')}` : '';

  document.getElementById('productPage').innerHTML = `
  <div class="product-gallery">
    <div class="gallery-main">
      ${product.image ? `<img src="${product.image}" alt="${product.name}" id="mainImg">` : `<span class="gallery-mono">DL</span>`}
      ${product.badge ? `<span class="gallery-badge ${badgeClass}">${product.badge}</span>` : ''}
    </div>
    <div class="gallery-thumbs">
      ${[1,2,3,4].map((n,i)=>`<div class="gallery-thumb ${i===0?'active':''}" onclick="selectThumb(this)">${i===0&&product.image?'<img src="'+product.image+'" style="width:100%;height:100%;object-fit:cover">':'DL'}</div>`).join('')}
    </div>
  </div>

  <div class="product-info">
    <div class="prod-eyebrow">${product.category} · ${product.gender}</div>
    <h1 class="prod-name">${product.name}</h1>
    <div class="prod-rating-row">
      <span class="prod-stars">${stars(product.rating)}</span>
      <span class="prod-reviews">${product.reviews} reviews</span>
    </div>
    <div class="prod-price">${fmt(product.price)}${product.originalPrice?`<span class="prod-original">${fmt(product.originalPrice)}</span>`:''}</div>

    <p class="prod-desc">${product.description}</p>

    <div class="option-label">Colour — <span id="colorLabel" style="font-weight:400;color:var(--text-muted)">${selectedColor}</span></div>
    <div class="color-options">
      ${product.colors.map((c,i)=>`<button class="color-btn ${i===0?'active':''}" onclick="selectColor('${c}',this)">${c}</button>`).join('')}
    </div>

    <div class="option-label">Size — <span id="sizeLabel" style="font-weight:400;color:var(--text-muted)">${selectedSize}</span></div>
    <div class="size-options">
      ${product.sizes.map((s,i)=>`<button class="size-btn ${i===0?'active':''}" onclick="selectSize('${s}',this)">${s}</button>`).join('')}
    </div>
    <a class="size-guide-link" href="#">Size Guide →</a>

    <div class="qty-row">
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <div class="qty-num" id="qtyDisplay">1</div>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
      <span style="font-size:11px;color:var(--text-muted)">In Stock</span>
    </div>

    <div class="product-cta-row">
      <button class="add-to-bag" onclick="addToBag()">Add to Bag</button>
      <button class="wishlist-btn ${wishlisted?'active':''}" id="wishBtn" onclick="toggleWishBtn()" title="Wishlist">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="${wishlisted?'var(--brown-mid)':'none'}" stroke="var(--brown-mid)" stroke-width="1.4"><path d="M9 15.5S2 10.5 2 5.5a4 4 0 0 1 7-2.6A4 4 0 0 1 16 5.5c0 5-7 10-7 10z"/></svg>
      </button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('details',this)">Details</button>
      <button class="tab-btn" onclick="switchTab('material',this)">Material & Care</button>
      <button class="tab-btn" onclick="switchTab('delivery',this)">Delivery</button>
    </div>
    <div class="tab-content active" id="tab-details">${product.description}</div>
    <div class="tab-content" id="tab-material"><strong>Material:</strong> ${product.material}<br><br><strong>Care:</strong> ${product.care}</div>
    <div class="tab-content" id="tab-delivery">Standard Delivery (3–5 working days) — ₦5,000<br>Express Delivery (1–2 working days) — ₦12,000<br>Store Pickup Lagos — Free<br><br>Free delivery on all orders above ₦150,000.</div>

    <div class="product-meta" style="margin-top:24px">
      <div class="meta-row"><span class="meta-label">Category</span><span class="meta-value">${product.category}</span></div>
      <div class="meta-row"><span class="meta-label">Material</span><span class="meta-value">${product.material}</span></div>
      <div class="meta-row"><span class="meta-label">Available</span><span class="meta-value">${product.sizes.join(', ')}</span></div>
    </div>
  </div>`;

  // Related products
  const related = DONLOOKS.products.filter(p=>p.id!==product.id&&(p.category===product.category||p.gender===product.gender)).slice(0,4);
  document.getElementById('relatedGrid').innerHTML = related.map(productCardHTML).join('');

  function selectSize(size, btn){
    selectedSize = size;
    document.getElementById('sizeLabel').textContent = size;
    document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
  function selectColor(color, btn){
    selectedColor = color;
    document.getElementById('colorLabel').textContent = color;
    document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
  function changeQty(d){
    qty = Math.max(1, qty+d);
    document.getElementById('qtyDisplay').textContent = qty;
  }
  function addToBag(){
    Cart.add(product, selectedSize, selectedColor, qty);
  }
  function toggleWishBtn(){
    wishlisted = Wishlist.toggle(product.id);
    const btn = document.getElementById('wishBtn');
    btn.classList.toggle('active', wishlisted);
    btn.querySelector('svg').setAttribute('fill', wishlisted?'var(--brown-mid)':'none');
  }
  function selectThumb(el){
    document.querySelectorAll('.gallery-thumb').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
  }
  function switchTab(id, btn){
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    btn.classList.add('active');
  }

  window.selectSize=selectSize; window.selectColor=selectColor;
  window.changeQty=changeQty; window.addToBag=addToBag;
  window.toggleWishBtn=toggleWishBtn; window.selectThumb=selectThumb;
  window.switchTab=switchTab;
}
</script>
</body>
</html>
