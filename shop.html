<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — DON LOOKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.shop-layout{display:grid;grid-template-columns:240px 1fr;gap:48px;padding:48px 0 100px;}
.sidebar{position:sticky;top:100px;align-self:start;}
.filter-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dark);font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.filter-group{margin-bottom:32px;}
.filter-group-label{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-muted);font-weight:600;margin-bottom:12px;}
.filter-option{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;border:none;background:none;width:100%;font-family:'Montserrat',sans-serif;font-size:12px;color:var(--text-muted);transition:color .3s;}
.filter-option:hover,.filter-option.active{color:var(--brown-mid);}
.filter-option .check{width:16px;height:16px;border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .3s;}
.filter-option.active .check{background:var(--brown-mid);border-color:var(--brown-mid);}
.filter-option.active .check::after{content:'✓';color:white;font-size:10px;}
.filter-count{margin-left:auto;font-size:10px;color:var(--text-light);}
.price-range{display:flex;flex-direction:column;gap:8px;}
.price-inputs{display:flex;gap:8px;align-items:center;}
.price-input{width:100%;padding:8px 10px;border:1px solid var(--border);font-family:'Montserrat',sans-serif;font-size:11px;color:var(--text-dark);outline:none;}
.price-input:focus{border-color:var(--brown-mid);}
.clear-filters{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--brown-mid);background:none;border:none;cursor:pointer;padding:0;font-family:'Montserrat',sans-serif;margin-top:8px;}
.clear-filters:hover{text-decoration:underline;}

.shop-main{}
.shop-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.results-count{font-size:12px;color:var(--text-muted);}
.results-count strong{color:var(--text-dark);}
.toolbar-right{display:flex;align-items:center;gap:16px;}
.search-bar{display:flex;align-items:center;border:1px solid var(--border);padding:8px 14px;gap:8px;transition:border-color .3s;}
.search-bar:focus-within{border-color:var(--brown-mid);}
.search-bar input{border:none;outline:none;font-family:'Montserrat',sans-serif;font-size:12px;color:var(--text-dark);width:180px;background:transparent;}
.search-bar input::placeholder{color:var(--text-light);}
.sort-select{padding:9px 14px;border:1px solid var(--border);font-family:'Montserrat',sans-serif;font-size:11px;color:var(--text-dark);outline:none;cursor:pointer;background:var(--white);}
.sort-select:focus{border-color:var(--brown-mid);}
.view-toggle{display:flex;gap:4px;}
.view-btn{width:32px;height:32px;border:1px solid var(--border);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;}
.view-btn.active{background:var(--brown-mid);border-color:var(--brown-mid);color:white;}
.view-btn svg{pointer-events:none;}

.no-results{grid-column:1/-1;text-align:center;padding:80px 20px;}
.no-results-icon{font-size:48px;margin-bottom:16px;opacity:.3;}
.no-results h3{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;margin-bottom:8px;}
.no-results p{font-size:12px;color:var(--text-muted);}

.active-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.filter-tag{display:flex;align-items:center;gap:6px;background:var(--cream);border:1px solid var(--border);padding:5px 12px;font-size:10px;color:var(--text-mid);letter-spacing:1px;}
.filter-tag button{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px;line-height:1;padding:0;}

@media(max-width:900px){
  .shop-layout{grid-template-columns:1fr;}
  .sidebar{position:static;display:none;}
  .sidebar.mobile-open{display:block;}
}
</style>
</head>
<body>
<div id="navContainer"></div>

<div class="page-hero">
  <div class="page-hero-label">Explore</div>
  <h1 class="page-hero-h1">The <em>Collection</em></h1>
</div>
<div id="marqueeContainer"></div>

<div class="container">
  <div class="shop-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="filter-title">Filter & Refine</div>

      <div class="filter-group">
        <div class="filter-group-label">Category</div>
        <div id="catFilters"></div>
      </div>

      <div class="filter-group">
        <div class="filter-group-label">Gender</div>
        <button class="filter-option" data-filter="gender" data-value="All" onclick="toggleFilter('gender','All',this)">
          <span class="check"></span>All<span class="filter-count" id="cnt-gender-All"></span>
        </button>
        <button class="filter-option" data-filter="gender" data-value="Women" onclick="toggleFilter('gender','Women',this)">
          <span class="check"></span>Women<span class="filter-count" id="cnt-gender-Women"></span>
        </button>
        <button class="filter-option" data-filter="gender" data-value="Men" onclick="toggleFilter('gender','Men',this)">
          <span class="check"></span>Men<span class="filter-count" id="cnt-gender-Men"></span>
        </button>
      </div>

      <div class="filter-group">
        <div class="filter-group-label">Price Range</div>
        <div class="price-range">
          <div class="price-inputs">
            <input type="number" class="price-input" id="priceMin" placeholder="Min ₦" onchange="applyFilters()">
            <span style="color:var(--text-muted);font-size:12px">—</span>
            <input type="number" class="price-input" id="priceMax" placeholder="Max ₦" onchange="applyFilters()">
          </div>
        </div>
      </div>

      <button class="clear-filters" onclick="clearFilters()">✕ Clear All Filters</button>
    </aside>

    <!-- MAIN -->
    <div class="shop-main">
      <div class="active-filters" id="activeFilters"></div>
      <div class="shop-toolbar">
        <div class="results-count" id="resultsCount"></div>
        <div class="toolbar-right">
          <div class="search-bar">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/><line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            <input type="text" id="searchInput" placeholder="Search products..." oninput="applyFilters()">
          </div>
          <select class="sort-select" id="sortSelect" onchange="applyFilters()">
            <option value="default">Sort: Featured</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="name-asc">Name: A–Z</option>
            <option value="rating">Top Rated</option>
          </select>
          <div class="view-toggle">
            <button class="view-btn active" id="view4" onclick="setView(4)" title="4 column">
              <svg width="14" height="14" viewBox="0 0 14 14"><rect x="0" y="0" width="6" height="6" fill="currentColor" rx="0.5"/><rect x="8" y="0" width="6" height="6" fill="currentColor" rx="0.5"/><rect x="0" y="8" width="6" height="6" fill="currentColor" rx="0.5"/><rect x="8" y="8" width="6" height="6" fill="currentColor" rx="0.5"/></svg>
            </button>
            <button class="view-btn" id="view2" onclick="setView(2)" title="2 column">
              <svg width="14" height="14" viewBox="0 0 14 14"><rect x="0" y="0" width="6" height="14" fill="currentColor" rx="0.5"/><rect x="8" y="0" width="6" height="14" fill="currentColor" rx="0.5"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="products-grid" id="shopGrid"></div>
    </div>
  </div>
</div>

<div id="footerContainer"></div>
<script src="data.js"></script>
<script src="app.js"></script>
<script>
document.getElementById('navContainer').innerHTML = renderNav('shop');
document.getElementById('marqueeContainer').innerHTML = renderMarquee();
document.getElementById('footerContainer').innerHTML = renderFooter();

let activeFilters = { category:'All', gender:'All' };
let currentView = 4;

// Read URL params
const urlParams = new URLSearchParams(location.search);
const urlCat = urlParams.get('cat');
if(urlCat){
  if(['Women','Men'].includes(urlCat)) activeFilters.gender = urlCat;
  else activeFilters.category = urlCat;
}

// Build category filters
const cats = ['All',...new Set(DONLOOKS.products.map(p=>p.category))];
document.getElementById('catFilters').innerHTML = cats.map(c=>`
  <button class="filter-option ${activeFilters.category===c?'active':''}" data-filter="category" data-value="${c}" onclick="toggleFilter('category','${c}',this)">
    <span class="check"></span>${c}
    <span class="filter-count" id="cnt-cat-${c.replace(/\s/g,'-')}">${c==='All'?DONLOOKS.products.length:DONLOOKS.products.filter(p=>p.category===c).length}</span>
  </button>`).join('');

// Set gender count
['All','Women','Men'].forEach(g=>{
  const el = document.getElementById('cnt-gender-'+g);
  if(el) el.textContent = g==='All' ? DONLOOKS.products.length : DONLOOKS.products.filter(p=>p.gender===g).length;
});

function toggleFilter(type, value, btn){
  activeFilters[type] = value;
  document.querySelectorAll(`[data-filter="${type}"]`).forEach(b=>{
    b.classList.toggle('active', b.dataset.value===value);
  });
  applyFilters();
}

function applyFilters(){
  let products = [...DONLOOKS.products];
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const sort = document.getElementById('sortSelect').value;
  const minP = parseFloat(document.getElementById('priceMin').value)||0;
  const maxP = parseFloat(document.getElementById('priceMax').value)||Infinity;

  if(activeFilters.category !== 'All') products = products.filter(p=>p.category===activeFilters.category);
  if(activeFilters.gender !== 'All') products = products.filter(p=>p.gender===activeFilters.gender);
  if(search) products = products.filter(p=>p.name.toLowerCase().includes(search)||p.category.toLowerCase().includes(search)||p.description.toLowerCase().includes(search));
  products = products.filter(p=>p.price>=minP && p.price<=maxP);

  if(sort==='price-asc') products.sort((a,b)=>a.price-b.price);
  else if(sort==='price-desc') products.sort((a,b)=>b.price-a.price);
  else if(sort==='name-asc') products.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='rating') products.sort((a,b)=>b.rating-a.rating);

  document.getElementById('resultsCount').innerHTML = `<strong>${products.length}</strong> products found`;

  const grid = document.getElementById('shopGrid');
  if(products.length===0){
    grid.innerHTML=`<div class="no-results"><div class="no-results-icon">🔍</div><h3>No products found</h3><p>Try adjusting your filters or search term.</p></div>`;
  } else {
    grid.innerHTML = products.map(productCardHTML).join('');
  }

  // Active filter tags
  const tags = [];
  if(activeFilters.category!=='All') tags.push({label:'Category: '+activeFilters.category, clear:()=>toggleFilter('category','All',document.querySelector('[data-filter="category"][data-value="All"]'))});
  if(activeFilters.gender!=='All') tags.push({label:'Gender: '+activeFilters.gender, clear:()=>toggleFilter('gender','All',document.querySelector('[data-filter="gender"][data-value="All"]'))});
  document.getElementById('activeFilters').innerHTML = tags.map(t=>`<span class="filter-tag">${t.label}</span>`).join('');
}

function clearFilters(){
  activeFilters = {category:'All',gender:'All'};
  document.getElementById('searchInput').value='';
  document.getElementById('priceMin').value='';
  document.getElementById('priceMax').value='';
  document.getElementById('sortSelect').value='default';
  document.querySelectorAll('.filter-option').forEach(b=>{
    b.classList.toggle('active', b.dataset.value==='All');
  });
  applyFilters();
}

function setView(cols){
  currentView = cols;
  const grid = document.getElementById('shopGrid');
  grid.className = cols===2 ? 'products-grid three-col' : 'products-grid';
  document.getElementById('view4').classList.toggle('active', cols===4);
  document.getElementById('view2').classList.toggle('active', cols===2);
}

applyFilters();
</script>
</body>
</html>
