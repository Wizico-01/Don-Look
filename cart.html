<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Bag — DON LOOKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.cart-layout{display:grid;grid-template-columns:1fr 380px;gap:48px;padding:120px 0 100px;align-items:start;}
.cart-items-title{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--text-dark);font-weight:700;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}
.cart-item{display:grid;grid-template-columns:100px 1fr auto;gap:20px;padding:24px 0;border-bottom:1px solid var(--border);align-items:center;}
.cart-item-img{width:100px;height:128px;background:var(--cream);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:28px;color:rgba(90,50,0,.15);overflow:hidden;flex-shrink:0;}
.cart-item-img img{width:100%;height:100%;object-fit:cover;}
.cart-item-cat{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--brown-light);margin-bottom:6px;}
.cart-item-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--text-dark);margin-bottom:8px;cursor:pointer;}
.cart-item-name:hover{color:var(--brown-mid);}
.cart-item-meta{font-size:11px;color:var(--text-muted);margin-bottom:14px;}
.cart-item-meta span{margin-right:16px;}
.cart-qty{display:flex;align-items:center;border:1px solid var(--border);width:fit-content;}
.cart-qty-btn{width:36px;height:36px;border:none;background:none;font-size:16px;cursor:pointer;color:var(--text-mid);transition:background .2s;}
.cart-qty-btn:hover{background:var(--cream);}
.cart-qty-num{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;border-left:1px solid var(--border);border-right:1px solid var(--border);}
.cart-item-price{font-size:18px;font-weight:600;color:var(--text-dark);text-align:right;}
.cart-item-remove{font-size:11px;color:var(--text-muted);text-decoration:underline;cursor:pointer;background:none;border:none;font-family:'Montserrat',sans-serif;margin-top:8px;display:block;text-align:right;}
.cart-item-remove:hover{color:var(--error);}

.order-summary{background:var(--off-white);border:1px solid var(--border);padding:32px;position:sticky;top:100px;}
.summary-title{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--text-dark);font-weight:700;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.summary-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:13px;}
.summary-label{color:var(--text-muted);}
.summary-value{color:var(--text-dark);font-weight:500;}
.summary-total{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
.summary-total-label{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-dark);}
.summary-total-value{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--text-dark);}
.shipping-options{margin:20px 0;display:flex;flex-direction:column;gap:10px;}
.shipping-opt{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);cursor:pointer;transition:border-color .3s;}
.shipping-opt:hover,.shipping-opt.selected{border-color:var(--brown-mid);}
.shipping-opt input[type=radio]{accent-color:var(--brown-mid);width:16px;height:16px;}
.shipping-opt-label{font-size:12px;color:var(--text-dark);flex:1;}
.shipping-opt-price{font-size:12px;font-weight:600;color:var(--text-dark);}
.promo-row{display:flex;gap:8px;margin:20px 0;}
.promo-input{flex:1;padding:12px 14px;border:1px solid var(--border);font-family:'Montserrat',sans-serif;font-size:11px;outline:none;transition:border-color .3s;}
.promo-input:focus{border-color:var(--brown-mid);}
.promo-btn{padding:12px 16px;background:none;border:1px solid var(--border-strong);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:var(--brown-mid);transition:all .3s;white-space:nowrap;}
.promo-btn:hover{background:var(--brown-mid);color:white;border-color:var(--brown-mid);}
.checkout-btn{width:100%;padding:18px;background:var(--brown-mid);color:white;border:none;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;margin-top:20px;transition:background .3s;}
.checkout-btn:hover{background:var(--brown-dark);}
.continue-btn{width:100%;padding:14px;background:none;color:var(--brown-mid);border:1px solid var(--border-strong);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:10px;transition:all .3s;}
.continue-btn:hover{border-color:var(--brown-mid);background:rgba(90,50,0,.03);}
.secure-badges{display:flex;justify-content:center;gap:20px;margin-top:20px;font-size:10px;color:var(--text-muted);}
.secure-badge{display:flex;align-items:center;gap:5px;}

@media(max-width:900px){
  .cart-layout{grid-template-columns:1fr;padding:100px 0 60px;}
  .order-summary{position:static;}
}
@media(max-width:600px){
  .cart-item{grid-template-columns:80px 1fr;gap:12px;}
  .cart-item-price{grid-column:2;text-align:left;}
}
</style>
</head>
<body>
<div id="navContainer"></div>

<div class="container">
  <div class="cart-layout">
    <div>
      <div class="cart-items-title">
        <span>Your Bag</span>
        <span id="itemCount" style="font-weight:400;color:var(--text-muted)"></span>
      </div>
      <div id="cartItems"></div>
    </div>

    <div class="order-summary" id="orderSummary" style="display:none">
      <div class="summary-title">Order Summary</div>

      <div class="summary-row"><span class="summary-label">Subtotal</span><span class="summary-value" id="subtotalVal">₦0</span></div>
      <div class="summary-row"><span class="summary-label">Shipping</span><span class="summary-value" id="shippingVal">—</span></div>
      <div class="summary-row" id="discountRow" style="display:none"><span class="summary-label">Discount</span><span class="summary-value" style="color:var(--success)" id="discountVal"></span></div>

      <div style="margin:16px 0;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);font-weight:600;">Delivery Method</div>
      <div class="shipping-options" id="shippingOpts"></div>

      <div class="promo-row">
        <input type="text" class="promo-input" id="promoInput" placeholder="Promo code">
        <button class="promo-btn" onclick="applyPromo()">Apply</button>
      </div>

      <div class="summary-total">
        <span class="summary-total-label">Total</span>
        <span class="summary-total-value" id="totalVal">₦0</span>
      </div>

      <button class="checkout-btn" onclick="location.href='checkout.html'">Proceed to Checkout →</button>
      <button class="continue-btn" onclick="location.href='shop.html'">← Continue Shopping</button>

      <div class="secure-badges">
        <div class="secure-badge">🔒 Secure Checkout</div>
        <div class="secure-badge">🛡️ Buyer Protection</div>
      </div>
    </div>
  </div>
</div>

<div id="footerContainer"></div>
<script src="data.js"></script>
<script src="app.js"></script>
<script>
document.getElementById('navContainer').innerHTML = renderNav('');
document.getElementById('footerContainer').innerHTML = renderFooter();

let selectedShipping = 'standard';
let promoDiscount = 0;

function renderCart(){
  const cart = Cart.get();
  const container = document.getElementById('cartItems');
  const summary = document.getElementById('orderSummary');

  document.getElementById('itemCount').textContent = cart.length
    ? `${cart.reduce((s,i)=>s+i.qty,0)} items`
    : '';

  if(cart.length===0){
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🛍️</div>
        <h3>Your Bag is Empty</h3>
        <p>Looks like you haven't added anything to your bag yet.<br>Explore the collection to find your next statement piece.</p>
        <a href="shop.html" class="btn-fill">Shop Now</a>
      </div>`;
    summary.style.display = 'none';
    return;
  }

  summary.style.display = 'block';

  container.innerHTML = cart.map(item=>`
    <div class="cart-item">
      <div class="cart-item-img" onclick="location.href='product.html?id=${item.id}'" style="cursor:pointer">
        ${item.image ? `<img src="${item.image}" alt="${item.name}">` : 'DL'}
      </div>
      <div>
        <div class="cart-item-cat">${(DONLOOKS.products.find(p=>p.id===item.id)||{}).category||'Fashion'}</div>
        <div class="cart-item-name" onclick="location.href='product.html?id=${item.id}'">${item.name}</div>
        <div class="cart-item-meta">
          <span>Size: ${item.size}</span>
          <span>Colour: ${item.color}</span>
        </div>
        <div class="cart-qty">
          <button class="cart-qty-btn" onclick="updateItem('${item.key}',${item.qty-1})">−</button>
          <div class="cart-qty-num">${item.qty}</div>
          <button class="cart-qty-btn" onclick="updateItem('${item.key}',${item.qty+1})">+</button>
        </div>
      </div>
      <div>
        <div class="cart-item-price">${fmt(item.price*item.qty)}</div>
        <div style="font-size:11px;color:var(--text-muted);text-align:right;margin-top:4px">${fmt(item.price)} each</div>
        <button class="cart-item-remove" onclick="removeItem('${item.key}')">Remove</button>
      </div>
    </div>`).join('');

  // Shipping options
  const subtotal = Cart.total();
  const shipping = DONLOOKS.shipping;
  document.getElementById('shippingOpts').innerHTML = [
    {key:'standard', ...shipping.standard},
    {key:'express', ...shipping.express},
    {key:'pickup', ...shipping.pickup}
  ].map(s=>`
    <label class="shipping-opt ${selectedShipping===s.key?'selected':''}">
      <input type="radio" name="shipping" value="${s.key}" ${selectedShipping===s.key?'checked':''} onchange="selectShipping('${s.key}')">
      <span class="shipping-opt-label">${s.label}</span>
      <span class="shipping-opt-price">${s.cost===0?(subtotal>=shipping.free_threshold?'Free':'Free'):`${fmt(s.cost)}`}</span>
    </label>`).join('');

  updateSummary();
}

function updateSummary(){
  const subtotal = Cart.total();
  const shippingObj = DONLOOKS.shipping;
  let shippingCost = 0;
  if(selectedShipping==='standard') shippingCost = subtotal>=shippingObj.free_threshold ? 0 : shippingObj.standard.cost;
  else if(selectedShipping==='express') shippingCost = shippingObj.express.cost;

  document.getElementById('subtotalVal').textContent = fmt(subtotal);
  document.getElementById('shippingVal').textContent = shippingCost===0 ? 'Free' : fmt(shippingCost);

  const total = subtotal + shippingCost - promoDiscount;
  document.getElementById('totalVal').textContent = fmt(total);

  if(promoDiscount>0){
    document.getElementById('discountRow').style.display='flex';
    document.getElementById('discountVal').textContent = '-'+fmt(promoDiscount);
  }
}

function selectShipping(key){
  selectedShipping = key;
  document.querySelectorAll('.shipping-opt').forEach(el=>{
    el.classList.toggle('selected', el.querySelector('input').value===key);
  });
  updateSummary();
}

function updateItem(key, qty){
  if(qty<1){ removeItem(key); return; }
  Cart.update(key, qty);
  renderCart();
}

function removeItem(key){
  Cart.remove(key);
  renderCart();
  showToast('Item removed from bag');
}

function applyPromo(){
  const code = document.getElementById('promoInput').value.trim().toUpperCase();
  const codes = {'DONLOOKS10':0.10, 'LUXURY20':0.20, 'FIRSTORDER':0.15};
  if(codes[code]){
    promoDiscount = Math.round(Cart.total() * codes[code]);
    showToast(`✓ Promo code applied! ${(codes[code]*100).toFixed(0)}% off`);
    updateSummary();
  } else {
    showToast('Invalid promo code');
  }
}

renderCart();
</script>
</body>
</html>
