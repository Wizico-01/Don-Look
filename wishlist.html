<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist — DON LOOKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="navContainer"></div>
<div class="page-hero">
  <div class="page-hero-label">Your Saved Pieces</div>
  <h1 class="page-hero-h1">My <em>Wishlist</em></h1>
</div>
<div class="container section-pad">
  <div id="wishContent"></div>
</div>
<div id="footerContainer"></div>
<script src="data.js"></script>
<script src="app.js"></script>
<script>
document.getElementById('navContainer').innerHTML = renderNav('');
document.getElementById('footerContainer').innerHTML = renderFooter();

const ids = Wishlist.get();
const products = ids.map(id=>DONLOOKS.products.find(p=>p.id===id)).filter(Boolean);

if(products.length===0){
  document.getElementById('wishContent').innerHTML = `
    <div class="empty-state">
      <div class="empty-state-icon">♡</div>
      <h3>Your Wishlist is Empty</h3>
      <p>Save pieces you love by clicking the heart icon on any product.<br>They'll be waiting here when you're ready.</p>
      <a href="shop.html" class="btn-fill">Explore Collection</a>
    </div>`;
} else {
  document.getElementById('wishContent').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:40px">
      <p style="font-size:12px;color:var(--text-muted)">${products.length} saved piece${products.length!==1?'s':''}</p>
      <button class="btn-outline" style="font-size:10px" onclick="if(confirm('Clear your wishlist?')){localStorage.removeItem('dl_wish');location.reload();}">Clear Wishlist</button>
    </div>
    <div class="products-grid">${products.map(productCardHTML).join('')}</div>`;
}
</script>
</body>
</html>
